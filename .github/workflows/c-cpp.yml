name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install SFML and dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y libsfml-dev

    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build
